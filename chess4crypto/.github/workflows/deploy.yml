name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "chess4crypto/frontend/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chess4crypto/frontend/package-lock.json

      - name: Install & Build
        run: |
          cd chess4crypto/frontend
          npm ci --legacy-peer-deps
          npx vite build

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: chess4crypto/frontend/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4