name: Deploy Chess4Crypto

on:
  push:
    branches: [ main ]
    paths:
      - 'chess4crypto/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'chess4crypto/frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd chess4crypto/frontend
          # Очищаем кэш и устанавливаем зависимости
          npm cache clean --force
          npm ci --legacy-peer-deps 2>/dev/null || npm install --legacy-peer-deps
          # Делаем bin-файлы исполняемыми (исправление "Permission denied")
          chmod +x node_modules/.bin/vite 2>/dev/null || true

      -- name: Build
  run: |
    cd chess4crypto/frontend
    # Добавляем node_modules/.bin в PATH
    export PATH="$PATH:$(pwd)/node_modules/.bin"
    npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'chess4crypto/frontend/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4