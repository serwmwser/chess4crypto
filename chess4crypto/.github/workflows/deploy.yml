name: Deploy Chess4Crypto

on:
  push:
    branches: [ main ]
    paths:
      - 'chess4crypto/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build
        run: |
          cd chess4crypto/frontend
          npm ci --legacy-peer-deps 2>/dev/null || npm install --legacy-peer-deps
          npm run build

      - name: Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'chess4crypto/frontend/dist'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4