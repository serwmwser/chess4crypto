# ============================================================================
# GITHUB ACTIONS WORKFLOW: Deploy Chess4Crypto Frontend to GitHub Pages
# ✅ Авто-деплой при пуше в ветку main
# ============================================================================

name: Deploy to GitHub Pages

# 🔹 Запускать сборку при пуше в main
on:
  push:
    branches: [ main ]
  # 🔹 Опционально: запуск вручную из вкладки Actions на GitHub
  workflow_dispatch:

# 🔹 Права доступа для деплоя на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 🔹 Одна задача: собрать и задеплоить
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # Используем свежий Ubuntu от GitHub
    
    steps:
      # 1️⃣ Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Устанавливаем Node.js 18 (совместим с вашим проектом)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3️⃣ Устанавливаем зависимости и собираем проект
      - name: Install dependencies & Build
        run: |
          cd frontend
          npm ci --legacy-peer-deps --ignore-scripts
          npm run build
        env:
          # ✅ Переменные окружения "впекаются" в сборку
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}

      # 4️⃣ Настраиваем GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 5️⃣ Загружаем собранные файлы как артефакт
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist  # ← Vite собирает в frontend/dist/

      # 6️⃣ Деплоим артефакт на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4