name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# ✅ Разрешения для деплоя на GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# ✅ Отменяем предыдущие запуски при новом пуше
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ Checkout кода
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Настройка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
          # ✅ ИСПРАВЛЕНО: Правильный путь к package-lock.json
          cache: 'npm'
          cache-dependency-path: 'chess4crypto/frontend/package-lock.json'

      # 3️⃣ Настройка GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 4️⃣ Установка зависимостей (в папке frontend)
      - name: Install dependencies
        run: |
          cd chess4crypto/frontend
          # ✅ Используем --ignore-scripts для ускорения и избежания ошибок
          npm ci --ignore-scripts --prefer-offline

      # 5️⃣ Сборка проекта
      - name: Build
        run: |
          cd chess4crypto/frontend
          # ✅ Используем npx для надёжности
          npx vite build --emptyOutDir

      # 6️⃣ Загрузка артефактов
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ✅ Правильный путь к папке dist
          path: 'chess4crypto/frontend/dist'

      # 7️⃣ Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4