name: Deploy Chess4Crypto

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout кода
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Настройка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'chess4crypto/frontend/package-lock.json'

      # 3️⃣ Установка зависимостей + Сборка + Деплой
      - name: Install, Build & Deploy
        run: |
          # Переходим в папку фронтенда
          cd chess4crypto/frontend
          
          # 🔧 Установка зависимостей (с фолбэком)
          echo "📦 Installing dependencies..."
          if [ -f "package-lock.json" ]; then
            npm ci --legacy-peer-deps --ignore-scripts
          else
            npm install --legacy-peer-deps --ignore-scripts
          fi
          
          # 🔨 Сборка проекта (через npx для надёжности)
          echo "🔨 Building project..."
          npx vite build --emptyOutDir
          
          # ✅ Готово
          echo "✅ Build completed!"
          ls -la dist/

      # 4️⃣ Загрузка артефактов
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'chess4crypto/frontend/dist'

      # 5️⃣ Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4