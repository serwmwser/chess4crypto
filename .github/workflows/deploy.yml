name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ Checkout кода (ОБЯЗАТЕЛЬНО с подмодулями!)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ✅ КРИТИЧНО: рекурсивно клонируем подмодули
          submodules: recursive
          fetch-depth: 0

      # 2️⃣ 🔍 ОТЛАДКА: покажем структуру файлов
      - name: Debug directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Root files ==="
          ls -la
          echo "=== Checking for chess4crypto ==="
          if [ -d "chess4crypto" ]; then
            echo "✅ chess4crypto folder EXISTS"
            ls -la chess4crypto/
            if [ -d "chess4crypto/frontend" ]; then
              echo "✅ chess4crypto/frontend folder EXISTS"
              ls -la chess4crypto/frontend/
            else
              echo "❌ chess4crypto/frontend folder NOT FOUND"
              echo "Contents of chess4crypto:"
              ls -la chess4crypto/ 2>/dev/null || echo "chess4crypto is empty or not accessible"
            fi
          else
            echo "❌ chess4crypto folder NOT FOUND"
            echo "All directories:"
            find . -maxdepth 2 -type d
          fi

      # 3️⃣ Настройка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
          # ❌ Кэш отключён для надёжности
          # cache: 'npm'

      # 4️⃣ Настройка GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # 5️⃣ 🔍 Поиск папки frontend (универсальный подход)
      - name: Find frontend directory
        id: find-frontend
        run: |
          # Ищем package.json с именем chess4crypto-frontend
          FRONTEND_PATH=$(find . -name "package.json" -exec grep -l '"chess4crypto-frontend"' {} \; | head -1 | xargs dirname)
          if [ -z "$FRONTEND_PATH" ]; then
            # Если не нашли по имени — ищем по наличию vite.config.js
            FRONTEND_PATH=$(find . -name "vite.config.js" | head -1 | xargs dirname)
          fi
          if [ -z "$FRONTEND_PATH" ]; then
            # Фолбэк: стандартные пути
            if [ -d "chess4crypto/frontend" ]; then
              FRONTEND_PATH="chess4crypto/frontend"
            elif [ -d "frontend" ]; then
              FRONTEND_PATH="frontend"
            else
              echo "❌ Could not find frontend directory!"
              exit 1
            fi
          fi
          echo "✅ Found frontend at: $FRONTEND_PATH"
          echo "frontend_path=$FRONTEND_PATH" >> $GITHUB_OUTPUT

      # 6️⃣ Установка зависимостей
      - name: Install dependencies
        run: |
          cd ${{ steps.find-frontend.outputs.frontend_path }}
          echo "📦 Installing in: $(pwd)"
          npm ci --ignore-scripts --prefer-offline || npm install --ignore-scripts

      # 7️⃣ Сборка проекта
      - name: Build
        run: |
          cd ${{ steps.find-frontend.outputs.frontend_path }}
          echo "🔨 Building in: $(pwd)"
          npx vite build --emptyOutDir

      # 8️⃣ Загрузка артефактов
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '${{ steps.find-frontend.outputs.frontend_path }}/dist'

      # 9️⃣ Деплой на GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4