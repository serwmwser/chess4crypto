<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>♟️ Chess4Crypto</title>
    <style>
      /* ✅ Гарантированные стили: контент виден всегда */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { 
        background: #0b1120; 
        color: #e2e8f0; 
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        line-height: 1.5;
      }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
      .debug-banner {
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        color: #000;
        padding: 0.75rem 1rem;
        text-align: center;
        font-weight: 600;
        font-size: 0.9rem;
      }
      .loading {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        padding: 2rem;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .error-box {
        background: #1e293b;
        border: 2px solid #ef4444;
        border-radius: 12px;
        padding: 1.5rem;
        margin: 1rem;
        color: #fecaca;
      }
      .error-box code {
        display: block;
        background: #0f172a;
        padding: 0.5rem;
        border-radius: 6px;
        margin-top: 0.5rem;
        font-size: 0.8rem;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <!-- ✅ Критично: точка входа для React -->
    <div id="root">
      <!-- ✅ Fallback-контент, если JS не загрузится -->
      <div class="debug-banner">🔧 Chess4Crypto — загрузка...</div>
      <div class="loading">
        <div class="spinner"></div>
        <p>Инициализация приложения...</p>
        <p style="color:#94a3b8;font-size:0.85rem">Если видите это сообщение дольше 10 секунд — проверьте консоль (F12)</p>
      </div>
    </div>
    
    <!-- ✅ Модульный скрипт -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
