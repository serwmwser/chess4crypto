<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/chess4crypto/">
  <title>Redirecting...</title>

    const path = window.location.pathname.replace(/^\/chess4crypto/, '');
    const target = `/chess4crypto/?redirect=${encodeURIComponent(path)}`;
    window.location.replace(target);
  </script>
</head>

</html>
